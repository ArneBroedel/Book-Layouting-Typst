<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hybrid base v4 — Primär-Algorithmus structure (no claim text).
  Flow: 1→2→3; ja→4a (loop monitor + escalate to 4b); nein→4b→5→6.
  viewBox 640×820. Text slots for Typst. License: project-internal.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 820" width="640" height="820" role="img">
  <title>Primär-Algorithmus Struktur v4 — ohne Claim-Text</title>
  <defs>
    <linearGradient id="laneL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="laneR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
    <filter id="soft" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#555555"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="640" height="820" fill="#ffffff"/>

  <!-- lanes -->
  <rect x="24" y="360" width="268" height="300" rx="26" fill="url(#laneL)" stroke="#16a34a" stroke-width="1.3" opacity="0.95"/>
  <rect x="348" y="360" width="268" height="420" rx="26" fill="url(#laneR)" stroke="#dc2626" stroke-width="1.5" opacity="0.95"/>

  <g filter="url(#soft)">
    <!-- 1: 180,56 280×64 -->
    <rect x="180" y="56" width="280" height="64" rx="14" fill="#f5f5f0" stroke="#cccccc" stroke-width="1.2"/>
    <!-- 2: 180,148 280×64 -->
    <rect x="180" y="148" width="280" height="64" rx="14" fill="#f5f5f0" stroke="#cccccc" stroke-width="1.2"/>
    <!-- 3 diamond center 320,280 — open interior -->
    <polygon points="320,230 400,280 320,330 240,280" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/>
    <!-- 4a: 44,400 228×72 -->
    <rect x="44" y="400" width="228" height="72" rx="28" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.3"/>
    <!-- 4a loop monitor: 44,520 228×64 -->
    <rect x="44" y="520" width="228" height="64" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="5 3"/>
    <!-- 4b: 368,400 228×72 -->
    <rect x="368" y="400" width="228" height="72" rx="28" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
    <!-- 5: 368,520 228×68 -->
    <rect x="368" y="520" width="228" height="68" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
    <!-- 6: 368,640 228×52 -->
    <rect x="368" y="640" width="228" height="52" rx="12" fill="#ccfbf1" stroke="#0d7377" stroke-width="1.2"/>
  </g>

  <!-- connectors: only correct edges -->
  <line x1="320" y1="120" x2="320" y2="148" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="320" y1="212" x2="320" y2="230" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- ja → 4a -->
  <path d="M 265 300 Q 170 340 158 400" fill="none" stroke="#16a34a" stroke-width="2.1" marker-end="url(#arrG)"/>
  <!-- nein → 4b -->
  <path d="M 375 300 Q 470 340 482 400" fill="none" stroke="#dc2626" stroke-width="2.2" marker-end="url(#arrR)"/>
  <!-- 4a → loop node -->
  <line x1="158" y1="472" x2="158" y2="520" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arrG)"/>
  <!-- loop back (curved left) -->
  <path d="M 70 552 Q 20 486 70 436" fill="none" stroke="#16a34a" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrG)"/>
  <!-- 4a escalate → 4b (horizontal red) -->
  <path d="M 272 436 Q 320 470 368 436" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrR)"/>
  <!-- 4b → 5 → 6 -->
  <line x1="482" y1="472" x2="482" y2="520" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arrR)"/>
  <line x1="482" y1="588" x2="482" y2="640" stroke="#0d7377" stroke-width="1.7" marker-end="url(#arr)"/>

  <!-- badges: 3 outside diamond left -->
  <g font-family="DejaVu Sans, sans-serif" font-weight="700" text-anchor="middle">
    <circle cx="200" cy="88" r="13" fill="#0d7377"/><text x="200" y="93" fill="#fff" font-size="12">1</text>
    <circle cx="200" cy="180" r="13" fill="#0d7377"/><text x="200" y="185" fill="#fff" font-size="12">2</text>
    <circle cx="228" cy="280" r="14" fill="#d97706"/><text x="228" y="285" fill="#fff" font-size="13">3</text>
    <circle cx="64" cy="436" r="13" fill="#16a34a"/><text x="64" y="441" fill="#fff" font-size="11">4a</text>
    <circle cx="64" cy="552" r="12" fill="#16a34a"/><text x="64" y="556" fill="#fff" font-size="11">↻</text>
    <circle cx="388" cy="436" r="13" fill="#dc2626"/><text x="388" y="441" fill="#fff" font-size="11">4b</text>
    <circle cx="388" cy="554" r="13" fill="#dc2626"/><text x="388" y="559" fill="#fff" font-size="12">5</text>
    <circle cx="388" cy="666" r="12" fill="#0d7377"/><text x="388" y="671" fill="#fff" font-size="12">6</text>
  </g>
</svg>
