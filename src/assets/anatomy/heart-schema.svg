<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 400" font-family="sans-serif">
  <rect width="360" height="400" fill="#ffffff"/>
  <!-- great vessels -->
  <path d="M150 70 q-20 -50 -55 -55" stroke="#b0b8bf" stroke-width="26" fill="none" stroke-linecap="round"/>
  <path d="M205 78 q34 -52 78 -44" stroke="#c0392b" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.85"/>
  <rect x="168" y="20" width="20" height="70" rx="8" fill="#2563eb" opacity="0.75"/>
  <!-- heart body -->
  <path d="M180 360
           C 90 300, 55 210, 70 150
           C 80 95, 150 90, 180 140
           C 210 90, 280 95, 290 150
           C 305 210, 270 300, 180 360 Z"
        fill="#f6e2e0" stroke="#7a2f29" stroke-width="3"/>
  <!-- septum -->
  <path d="M180 140 V340" stroke="#7a2f29" stroke-width="3" fill="none"/>
  <!-- chambers (atria top, ventricles bottom) -->
  <path d="M95 150 q30 -38 80 -14 V210 H92 Q86 175 95 150 Z" fill="#cfe3ee" opacity="0.8"/>
  <path d="M265 150 q-30 -38 -80 -14 V210 H268 Q274 175 265 150 Z" fill="#e9c9c6" opacity="0.8"/>
  <path d="M92 220 H172 V330 Q120 300 95 235 Q92 226 92 220 Z" fill="#cfe3ee" opacity="0.6"/>
  <path d="M268 220 H188 V330 Q240 300 265 235 Q268 226 268 220 Z" fill="#e9c9c6" opacity="0.6"/>
  <!-- valves -->
  <path d="M118 213 h48 M194 213 h48" stroke="#0d7377" stroke-width="4" stroke-linecap="round"/>
  <!-- coronary hint -->
  <path d="M180 142 q40 30 50 90" stroke="#d4a039" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
</svg>
