<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" font-family="sans-serif">
  <!-- transparenter Hintergrund: Text kann bis an die runde Kontur fließen -->
  <!-- cell membrane / cytoplasm (nahezu kreisförmig, füllt die Box) -->
  <ellipse cx="200" cy="200" rx="192" ry="186" fill="#eaf4f3" stroke="#0d7377" stroke-width="4"/>
  <ellipse cx="200" cy="200" rx="192" ry="186" fill="none" stroke="#14a3a8" stroke-width="2" stroke-dasharray="2 6"/>
  <!-- nucleus -->
  <circle cx="165" cy="180" r="66" fill="#cfe3ee" stroke="#094f52" stroke-width="3"/>
  <circle cx="165" cy="180" r="66" fill="none" stroke="#094f52" stroke-width="1.5" stroke-dasharray="3 4"/>
  <!-- nucleolus -->
  <circle cx="152" cy="168" r="22" fill="#094f52"/>
  <!-- chromatin hints -->
  <path d="M145 208 q22 -8 44 4 M205 158 q-14 12 -36 8" stroke="#0d7377" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- mitochondria -->
  <g fill="#d4a039" stroke="#a67c2e" stroke-width="2">
    <ellipse cx="292" cy="150" rx="36" ry="19" transform="rotate(-25 292 150)"/>
    <ellipse cx="300" cy="258" rx="32" ry="17" transform="rotate(20 300 258)"/>
  </g>
  <path d="M268 145 q12 15 48 -2 M280 260 q9 -13 40 0" stroke="#7a5a1f" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- ER (wavy) -->
  <path d="M120 278 q26 -15 52 0 q26 15 52 0" stroke="#0d7377" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M120 296 q26 -15 52 0 q26 15 52 0" stroke="#0d7377" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- vesicles -->
  <circle cx="118" cy="130" r="13" fill="#fff" stroke="#0d7377" stroke-width="2.5"/>
  <circle cx="258" cy="312" r="11" fill="#fff" stroke="#0d7377" stroke-width="2.5"/>
  <circle cx="330" cy="200" r="9" fill="#fff" stroke="#0d7377" stroke-width="2.5"/>
</svg>
