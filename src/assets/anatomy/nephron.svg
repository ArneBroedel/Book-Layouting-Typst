<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" font-family="sans-serif">
  <rect width="320" height="400" fill="#ffffff"/>
  <!-- glomerulus / Bowman capsule -->
  <circle cx="80" cy="70" r="40" fill="#cfe3ee" stroke="#094f52" stroke-width="3"/>
  <path d="M62 56 q12 -10 24 0 q12 10 0 22 q-12 12 -26 2 q-12 -10 2 -24
           M68 78 q14 6 28 -4 M58 70 q8 14 26 10"
        stroke="#c0392b" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- afferent / efferent arterioles -->
  <path d="M40 70 H22" stroke="#c0392b" stroke-width="7" stroke-linecap="round"/>
  <path d="M118 78 q26 6 26 30" stroke="#d4a039" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- proximal tubule -->
  <path d="M110 88
           C 150 110, 120 150, 165 165
           C 110 185, 150 215, 150 250"
        stroke="#14a3a8" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- loop of Henle -->
  <path d="M150 250 L150 330 Q150 360 178 360 Q206 360 206 330 L206 250"
        stroke="#0d7377" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- distal tubule -->
  <path d="M206 250 C 210 215, 250 200, 220 175 C 252 160, 232 130, 240 110"
        stroke="#14a3a8" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- collecting duct -->
  <path d="M240 110 V60" stroke="#a67c2e" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M240 360 V395" stroke="#a67c2e" stroke-width="16" fill="none" stroke-linecap="round" opacity="0"/>
  <!-- collecting duct flow to bottom -->
  <path d="M240 110 V60" stroke="#a67c2e" stroke-width="16" fill="none"/>
  <polygon points="240,42 232,62 248,62" fill="#a67c2e"/>
</svg>
