<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 360" font-family="sans-serif">
  <!-- kompaktes multipolares Neuron, nahezu quadratisch: füllt einen
       seitlichen Wrap-Bereich besser als die lineare Darstellung -->
  <!-- axon nach rechts mit Myelinscheiden -->
  <path d="M180 195 H330" stroke="#14a3a8" stroke-width="11" fill="none" stroke-linecap="round"/>
  <ellipse cx="230" cy="195" rx="24" ry="14" fill="#d4a039" stroke="#a67c2e" stroke-width="2"/>
  <ellipse cx="288" cy="195" rx="24" ry="14" fill="#d4a039" stroke="#a67c2e" stroke-width="2"/>
  <!-- axon terminals -->
  <g stroke="#0d7377" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M330 195 q26 -10 44 -34"/>
    <path d="M330 195 q30 0 50 4"/>
    <path d="M330 195 q26 14 42 38"/>
  </g>
  <circle cx="376" cy="159" r="9" fill="#0d7377"/>
  <circle cx="382" cy="201" r="9" fill="#0d7377"/>
  <circle cx="374" cy="235" r="9" fill="#0d7377"/>
  <!-- dendriten: füllen die linke Hälfte und oben/unten -->
  <g stroke="#0d7377" stroke-width="8" fill="none" stroke-linecap="round">
    <!-- nach oben -->
    <path d="M140 150 q-8 -60 -36 -92 M104 58 q-20 -16 -22 -40 M104 58 q-24 -6 -44 -16"/>
    <!-- nach oben-rechts -->
    <path d="M158 148 q16 -54 8 -104 M166 44 q-2 -22 14 -36 M166 44 q14 -14 36 -16"/>
    <!-- nach links -->
    <path d="M108 188 q-52 -6 -86 -34 M22 154 q-12 -14 -14 -2 M22 154 q-2 16 6 26"/>
    <!-- nach unten-links -->
    <path d="M118 232 q-44 30 -60 78 M58 310 q-12 18 -34 22 M58 310 q-4 20 -14 34"/>
    <!-- nach unten -->
    <path d="M150 246 q-2 56 -26 92 M124 338 q-16 12 -18 30 M124 338 q-20 4 -38 0"/>
  </g>
  <!-- soma -->
  <circle cx="146" cy="194" r="54" fill="#0d7377" stroke="#094f52" stroke-width="3"/>
  <!-- nucleus -->
  <circle cx="146" cy="194" r="22" fill="#094f52"/>
  <circle cx="139" cy="187" r="7" fill="#14a3a8"/>
</svg>
