- term: Evidenzbasierte Medizin
  definition: Medizinische Versorgung auf Basis der besten verfügbaren wissenschaftlichen Erkenntnisse.

- term: Cognitive Load Theory
  definition: Theorie über die begrenzte Kapazität des Arbeitsgedächtnisses beim Lernen.

- term: Didaktische Reduktion
  definition: Vereinfachung komplexer Inhalte für den Lernprozess ohne Verfälschung.

- term: Formatives Assessment
  definition: Lernbegleitende Überprüfung zur Steuerung des Lernprozesses.

- term: Summatives Assessment
  definition: Abschließende Leistungsüberprüfung am Ende einer Lerneinheit.

- term: Lernziel
  definition: Klar definierte Kompetenz, die am Ende einer Lerneinheit erreicht werden soll.

- term: Blended Learning
  definition: Kombination aus Präsenzlehre und digitalen Lernformaten.

- term: OSCE
  definition: Objective Structured Clinical Examination — standardisiertes klinisches Prüfungsformat.

- term: Simulationsbasiertes Lernen
  definition: Einsatz von Simulatoren und Rollenspielen zum Erwerb klinischer Fertigkeiten.
