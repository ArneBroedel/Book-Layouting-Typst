# form-catalog core — stub (Track form-catalog fills this)
# version mirrors ../VERSION
version: "0.1.0-dev"
description: >
  Generic + shared bookkit forms. Medical genre recipes live under
  domains/medical/recipes/. Status: stable | planned | deprecated.

# Minimal seed so validators/docs have a shape; expand in form-catalog track.
forms:
