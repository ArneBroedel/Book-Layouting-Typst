    api: "bookkit.callout"
    package: bookkit
  - id: memo
    status: stable
    purpose: "Key takeaway box"
    api: "bookkit-didactics.memo"
    package: bookkit-didactics
  - id: cave
    status: stable
    purpose: "Warning / contraindication box"
    api: "bookkit-didactics.cave"
    package: bookkit-didactics
  - id: styled-table
    status: stable
    purpose: "Styled data table"
    api: "bookkit.styled-table"
    package: bookkit
  - id: learning-objectives
    status: stable
    purpose: "Learning goals checklist"
    api: "bookkit-didactics.learning-objectives"
    package: bookkit-didactics
  - id: definition
    status: stable
    purpose: "Term definition box"
    api: "bookkit-didactics.definition"
    package: bookkit-didactics
